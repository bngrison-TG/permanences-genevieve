<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permanences – Tante Geneviève</title>
<style>
  :root {
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --border: #E8E6E0;
    --border-strong: #C8C5BC;
    --text: #1A1916;
    --text-soft: #6B6860;
    --text-muted: #A09E99;
    --accent: #5B4A9C;
    --accent-light: #EEECf8;
    --weekend: #F5F3EE;
    --ferie: #FFF3E0;
    --ferie-border: #FFB74D;
    --uncovered: #FFFFFF;
    --radius: 8px;
    --radius-lg: 12px;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; min-height: 100vh; }
  
  /* AUTH */
  #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2.5rem 2rem; width: 320px; text-align: center; box-shadow: var(--shadow); }
  .auth-card h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .auth-card p { font-size: 13px; color: var(--text-soft); margin-bottom: 1.5rem; }
  .auth-card input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 15px; text-align: center; letter-spacing: 4px; margin-bottom: 12px; outline: none; }
  .auth-card input:focus { border-color: var(--accent); }
  .auth-card button { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-size: 15px; cursor: pointer; font-weight: 500; }
  .auth-card button:hover { opacity: 0.9; }
  .auth-error { color: #E24B4A; font-size: 13px; margin-top: 8px; }

  /* LAYOUT */
  #app { display: none; max-width: 1100px; margin: 0 auto; padding: 1rem; }
  .app-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 0 1.25rem; flex-wrap: wrap; gap: 8px; }
  .app-title { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .app-title span { color: var(--accent); }
  
  /* MEMBER SECTION */
  .members-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .members-section h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 10px; }
  .members-list { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .member-chip { display: flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 99px; font-size: 13px; font-weight: 500; border: 1.5px solid; cursor: default; }
  .member-chip .chip-edit { font-size: 11px; opacity: 0.7; cursor: pointer; margin-left: 2px; text-decoration: none; }
  .member-chip .chip-edit:hover { opacity: 1; }
  .btn-add-member { padding: 5px 12px; border: 1.5px dashed var(--border-strong); border-radius: 99px; font-size: 13px; color: var(--text-soft); background: none; cursor: pointer; }
  .btn-add-member:hover { border-color: var(--accent); color: var(--accent); }
  .current-user-note { font-size: 12px; color: var(--text-muted); margin-top: 8px; }

  /* VIEW TOGGLE */
  .view-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .view-toggle { display: flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .view-toggle button { padding: 6px 14px; border: none; background: none; font-size: 13px; cursor: pointer; color: var(--text-soft); }
  .view-toggle button.active { background: var(--accent); color: white; }
  .nav-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: none; cursor: pointer; font-size: 14px; color: var(--text); }
  .nav-btn:hover { background: var(--accent-light); }
  .period-label { font-size: 15px; font-weight: 600; min-width: 160px; text-align: center; }

  /* CALENDAR MONTH */
  .cal-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .cal-grid-header { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--bg); border-bottom: 1px solid var(--border); }
  .cal-day-name { text-align: center; padding: 8px 4px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); }
  .cal-day-name.we { color: var(--accent); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-cell { min-height: 80px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 4px; position: relative; cursor: pointer; transition: background 0.1s; }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell.we { background: var(--weekend); }
  .cal-cell.ferie { background: var(--ferie); }
  .cal-cell.other-month { opacity: 0.3; pointer-events: none; }
  .cal-cell.out-of-range { opacity: 0.2; pointer-events: none; }
  .cal-cell:hover:not(.out-of-range):not(.other-month) { background: var(--accent-light); }
  .cal-cell.selecting { background: #DDD9F5 !important; }
  .day-num { font-size: 12px; font-weight: 600; color: var(--text-soft); margin-bottom: 2px; display: flex; align-items: center; gap: 4px; }
  .day-num.today-num { background: var(--accent); color: white; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; }
  .ferie-label { font-size: 9px; color: #E65100; font-weight: 500; line-height: 1.1; margin-bottom: 2px; }
  .slot-tag { font-size: 10px; font-weight: 500; padding: 2px 5px; border-radius: 4px; margin-bottom: 2px; border-left: 3px solid; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 2px; line-height: 1.3; }
  .slot-tag:hover { filter: brightness(0.95); }
  .slot-note-icon { opacity: 0.6; font-size: 9px; }

  /* WEEK VIEW */
  .week-grid { display: grid; grid-template-columns: 60px repeat(7, 1fr); border-top: 1px solid var(--border); }
  .week-day-header { text-align: center; padding: 8px 4px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .week-day-header .wd-name { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); }
  .week-day-header .wd-date { font-size: 16px; font-weight: 600; }
  .week-day-header.we { background: var(--weekend); }
  .week-day-header.ferie { background: var(--ferie); }
  .week-col-label { padding: 8px 4px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); background: var(--bg); }
  .week-cell { min-height: 60px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 4px; cursor: pointer; }
  .week-cell:last-child { border-right: none; }
  .week-cell.we { background: var(--weekend); }
  .week-cell.ferie { background: var(--ferie); }
  .week-cell:hover { background: var(--accent-light); }
  .week-cell.out-of-range { opacity: 0.2; pointer-events: none; }

  /* LEGEND */
  .legend { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-top: 10px; font-size: 12px; color: var(--text-soft); }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

  /* MODALS */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 500; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius-lg); padding: 1.5rem; width: 100%; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
  .modal label { font-size: 13px; color: var(--text-soft); display: block; margin-bottom: 4px; margin-top: 12px; }
  .modal input[type=text], .modal textarea, .modal select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: inherit; outline: none; }
  .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
  .modal textarea { resize: vertical; min-height: 60px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; justify-content: flex-end; flex-wrap: wrap; }
  .btn { padding: 8px 16px; border-radius: var(--radius); font-size: 13px; cursor: pointer; font-weight: 500; border: none; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary { background: none; border: 1px solid var(--border-strong); color: var(--text-soft); }
  .btn-secondary:hover { background: var(--bg); }
  .btn-danger { background: none; border: 1px solid #F09595; color: #A32D2D; margin-right: auto; }
  .btn-danger:hover { background: #FCEBEB; }

  /* COLOR PREVIEW */
  .color-preview { width: 24px; height: 24px; border-radius: 50%; display: inline-block; vertical-align: middle; margin-right: 6px; border: 2px solid rgba(0,0,0,0.1); }

  /* SELECTION INFO */
  .selection-info { background: var(--accent-light); border: 1px solid var(--accent); border-radius: var(--radius); padding: 8px 12px; font-size: 13px; margin-bottom: 10px; color: var(--accent); display: none; }
  
  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1A1916; color: white; padding: 10px 20px; border-radius: 99px; font-size: 13px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .cal-cell { min-height: 54px; padding: 2px; }
    .slot-tag { font-size: 9px; padding: 1px 3px; }
    .app-header { gap: 6px; }
    .period-label { font-size: 13px; min-width: 120px; }
    .week-grid { grid-template-columns: 44px repeat(7, 1fr); }
    .week-day-header .wd-date { font-size: 13px; }
  }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div style="font-size:32px; margin-bottom:8px;">💜</div>
    <h1>Permanences</h1>
    <p>Tante Geneviève · Été 2026</p>
    <input type="password" id="auth-input" placeholder="Mot de passe" autofocus />
    <button onclick="checkAuth()">Accéder</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-header">
    <div class="app-title">💜 Permanences <span>Tante Geneviève</span></div>
    <div class="view-controls">
      <button class="nav-btn" onclick="navigate(-1)">‹</button>
      <span class="period-label" id="period-label"></span>
      <button class="nav-btn" onclick="navigate(1)">›</button>
      <div class="view-toggle">
        <button onclick="setView('month')" id="btn-month" class="active">Mois</button>
        <button onclick="setView('week')" id="btn-week">Semaine</button>
      </div>
    </div>
  </div>

  <!-- MEMBERS -->
  <div class="members-section">
    <h2>Membres de la famille</h2>
    <div class="members-list" id="members-list"></div>
    <div class="current-user-note" id="current-user-note"></div>
  </div>

  <!-- SELECTION INFO -->
  <div class="selection-info" id="selection-info"></div>

  <!-- CALENDAR -->
  <div class="cal-wrap" id="cal-wrap"></div>

  <!-- LEGEND -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#F5F3EE;border:1px solid #E8E6E0;"></div> Week-end</div>
    <div class="legend-item"><div class="legend-dot" style="background:#FFF3E0;border:1px solid #FFB74D;"></div> Jour férié</div>
    <div class="legend-item"><div class="legend-dot" style="background:#FFFFFF;border:1px solid #E8E6E0;"></div> Jour non couvert</div>
    <div style="color:#A09E99;font-size:11px;margin-left:auto;">Cliquez ou glissez pour sélectionner des jours</div>
  </div>
</div>

<!-- MODAL: CRÉER MEMBRE -->
<div class="modal-overlay" id="modal-member">
  <div class="modal">
    <h3 id="modal-member-title">Mon étiquette</h3>
    <label>Mon prénom</label>
    <input type="text" id="member-name" placeholder="Votre prénom" maxlength="20" />
    <label>Couleur</label>
    <select id="member-color" onchange="updateColorPreview()">
      <option value="0">Violet</option>
      <option value="1">Vert forêt</option>
      <option value="2">Corail</option>
      <option value="3">Rose</option>
      <option value="4">Bleu</option>
      <option value="5">Ambre</option>
      <option value="6">Vert sauge</option>
      <option value="7">Terracotta</option>
    </select>
    <div style="margin-top:10px;font-size:13px;color:var(--text-soft);">Aperçu : <span id="color-preview-chip" style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:500;border:1.5px solid;">Prénom</span></div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="btn-delete-member" onclick="deleteMember()" style="display:none">Supprimer mon étiquette</button>
      <button class="btn btn-secondary" onclick="closeModal('modal-member')">Annuler</button>
      <button class="btn btn-primary" onclick="saveMember()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL: AJOUTER CRÉNEAU -->
<div class="modal-overlay" id="modal-slot">
  <div class="modal">
    <h3 id="modal-slot-title">Ajouter une permanence</h3>
    <div id="slot-date-display" style="font-size:13px;color:var(--text-soft);margin-bottom:8px;"></div>
    <label>Qui prend en charge ?</label>
    <select id="slot-member-select"></select>
    <label>Note (optionnel)</label>
    <textarea id="slot-note" placeholder="ex : apporter médicaments, rendez-vous médecin…" maxlength="200"></textarea>
    <div class="modal-actions">
      <button class="btn btn-danger" id="btn-delete-slot" onclick="deleteSlot()" style="display:none">Supprimer</button>
      <button class="btn btn-secondary" onclick="closeModal('modal-slot')">Annuler</button>
      <button class="btn btn-primary" onclick="saveSlot()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL: VOIR CRÉNEAU -->
<div class="modal-overlay" id="modal-view-slot">
  <div class="modal">
    <h3 id="view-slot-title"></h3>
    <div id="view-slot-content" style="font-size:14px;color:var(--text-soft);line-height:1.6;"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-view-slot')">Fermer</button>
      <button class="btn btn-primary" id="btn-edit-my-slot" onclick="editMySlotFromView()">Modifier ma permanence</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────
const BIN_ID = '6a36b196f5f4af5e2914b464';
const MASTER_KEY = '$2a$10$Sfj0pRzTS02qhP.FJ3xz5uITBzc1HHWsH9A64h6a658oF1mFLdxY.';
const API = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const PASSWORD = 'TG';
const START_DATE = new Date(2026, 5, 1);  // 1 juin 2026
const END_DATE   = new Date(2026, 8, 7);  // 7 sept 2026

const COLORS = [
  { name:'Violet',     bg:'#EEEDFE', border:'#534AB7', text:'#3C3489' },
  { name:'Vert forêt', bg:'#E1F5EE', border:'#0F6E56', text:'#085041' },
  { name:'Corail',     bg:'#FAECE7', border:'#993C1D', text:'#712B13' },
  { name:'Rose',       bg:'#FBEAF0', border:'#993556', text:'#72243E' },
  { name:'Bleu',       bg:'#E6F1FB', border:'#185FA5', text:'#0C447C' },
  { name:'Ambre',      bg:'#FAEEDA', border:'#854F0B', text:'#633806' },
  { name:'Vert sauge', bg:'#EAF3DE', border:'#3B6D11', text:'#27500A' },
  { name:'Terracotta', bg:'#FFF0E6', border:'#A0522D', text:'#7B3F1E' },
];

// Jours fériés France 2026
const FERIES = {
  '2026-07-14': 'Fête Nationale',
  '2026-08-15': 'Assomption',
};

const DAYS_FR  = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const MONTHS_FR= ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

// ─── STATE ────────────────────────────────────────────────────────────────
let data = { membres: [], creneaux: {} };
let currentUser = null; // { id, name, color }
let view = 'month';
let viewDate = new Date(2026, 5, 1);
let selecting = false;
let selStart = null, selEnd = null;
let editingSlotId = null;
let viewSlotDayKey = null;
let saving = false;

// ─── AUTH ─────────────────────────────────────────────────────────────────
function checkAuth() {
  const v = document.getElementById('auth-input').value.trim();
  if (v.toUpperCase() === PASSWORD) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
  } else {
    document.getElementById('auth-error').textContent = 'Mot de passe incorrect.';
  }
}
document.getElementById('auth-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkAuth(); });

// ─── DATA (JSONBin) ────────────────────────────────────────────────────────
async function loadData() {
  try {
    const r = await fetch(API + '/latest', { headers: { 'X-Master-Key': MASTER_KEY } });
    const j = await r.json();
    data = j.record || { membres: [], creneaux: {} };
    if (!data.membres) data.membres = [];
    if (!data.creneaux) data.creneaux = {};
  } catch(e) { data = { membres: [], creneaux: {} }; }
  checkCurrentUser();
  render();
}

async function saveData() {
  if (saving) return;
  saving = true;
  try {
    await fetch(API, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
      body: JSON.stringify(data)
    });
  } catch(e) { showToast('Erreur de sauvegarde'); }
  saving = false;
}

// ─── CURRENT USER (localStorage) ──────────────────────────────────────────
function checkCurrentUser() {
  const stored = localStorage.getItem('tg_user_id');
  if (stored) {
    currentUser = data.membres.find(m => m.id === stored) || null;
  }
}

// ─── UTILS ────────────────────────────────────────────────────────────────
function dayKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function keyToDate(k) {
  const [y,m,d] = k.split('-').map(Number);
  return new Date(y, m-1, d);
}
function inRange(d) {
  const t = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  return t >= START_DATE && t <= END_DATE;
}
function isWeekend(d) { const dw = d.getDay(); return dw === 0 || dw === 6; }
function isFerie(d) { return !!FERIES[dayKey(d)]; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function formatDateFR(d) {
  return d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });
}
function sortedKeys(a, b) { return a < b ? -1 : a > b ? 1 : 0; }

// ─── COLOR PREVIEW ────────────────────────────────────────────────────────
function updateColorPreview() {
  const idx = parseInt(document.getElementById('member-color').value);
  const c = COLORS[idx];
  const name = document.getElementById('member-name').value || 'Prénom';
  const chip = document.getElementById('color-preview-chip');
  chip.style.background = c.bg;
  chip.style.borderColor = c.border;
  chip.style.color = c.text;
  chip.textContent = name;
}
document.getElementById('member-name').addEventListener('input', updateColorPreview);

// ─── MEMBERS ──────────────────────────────────────────────────────────────
function renderMembers() {
  const list = document.getElementById('members-list');
  list.innerHTML = '';
  data.membres.forEach(m => {
    const c = COLORS[m.color];
    const chip = document.createElement('div');
    chip.className = 'member-chip';
    chip.style.background = c.bg;
    chip.style.borderColor = c.border;
    chip.style.color = c.text;
    const isMe = currentUser && currentUser.id === m.id;
    chip.innerHTML = `${m.name}${isMe ? ' <a class="chip-edit" title="Modifier mon étiquette">✏️</a>' : ''}`;
    if (isMe) chip.querySelector('.chip-edit').onclick = () => openMemberModal(true);
    list.appendChild(chip);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'btn-add-member';
  if (currentUser) {
    addBtn.style.display = 'none';
  } else {
    addBtn.textContent = '+ Créer mon étiquette';
    addBtn.onclick = () => openMemberModal(false);
  }
  list.appendChild(addBtn);
  
  const note = document.getElementById('current-user-note');
  if (currentUser) {
    const c = COLORS[currentUser.color];
    note.innerHTML = `Vous êtes connecté(e) en tant que <span style="font-weight:600;color:${c.text}">${currentUser.name}</span>.`;
  } else {
    note.textContent = 'Créez votre étiquette pour ajouter des permanences.';
  }
}

function openMemberModal(editing) {
  document.getElementById('modal-member-title').textContent = editing ? 'Mon étiquette' : 'Créer mon étiquette';
  document.getElementById('btn-delete-member').style.display = editing ? 'inline-flex' : 'none';
  if (editing && currentUser) {
    document.getElementById('member-name').value = currentUser.name;
    document.getElementById('member-color').value = currentUser.color;
  } else {
    document.getElementById('member-name').value = '';
    document.getElementById('member-color').value = '0';
  }
  updateColorPreview();
  document.getElementById('modal-member').classList.add('open');
}

async function saveMember() {
  const name = document.getElementById('member-name').value.trim();
  if (!name) { showToast('Entrez votre prénom'); return; }
  const color = parseInt(document.getElementById('member-color').value);
  if (currentUser) {
    currentUser.name = name;
    currentUser.color = color;
    const idx = data.membres.findIndex(m => m.id === currentUser.id);
    if (idx >= 0) data.membres[idx] = { ...currentUser };
  } else {
    const newM = { id: 'u_' + Date.now(), name, color };
    data.membres.push(newM);
    currentUser = newM;
    localStorage.setItem('tg_user_id', newM.id);
  }
  closeModal('modal-member');
  await saveData();
  render();
  showToast('Étiquette enregistrée ✓');
}

async function deleteMember() {
  if (!currentUser) return;
  if (!confirm('Supprimer votre étiquette et toutes vos permanences ?')) return;
  // Remove all slots of this member
  Object.keys(data.creneaux).forEach(k => {
    data.creneaux[k] = data.creneaux[k].filter(s => s.memberId !== currentUser.id);
    if (data.creneaux[k].length === 0) delete data.creneaux[k];
  });
  data.membres = data.membres.filter(m => m.id !== currentUser.id);
  currentUser = null;
  localStorage.removeItem('tg_user_id');
  closeModal('modal-member');
  await saveData();
  render();
  showToast('Étiquette supprimée');
}

// ─── CALENDAR RENDER ──────────────────────────────────────────────────────
function render() {
  renderMembers();
  if (view === 'month') renderMonth();
  else renderWeek();
  document.getElementById('btn-month').className = view === 'month' ? 'active' : '';
  document.getElementById('btn-week').className  = view === 'week'  ? 'active' : '';
}

function setView(v) { view = v; render(); }

function navigate(delta) {
  if (view === 'month') {
    viewDate.setMonth(viewDate.getMonth() + delta);
  } else {
    viewDate.setDate(viewDate.getDate() + delta * 7);
  }
  render();
}

// ─── MONTH VIEW ───────────────────────────────────────────────────────────
function renderMonth() {
  const y = viewDate.getFullYear(), m = viewDate.getMonth();
  document.getElementById('period-label').textContent = MONTHS_FR[m] + ' ' + y;
  const wrap = document.getElementById('cal-wrap');

  let html = '<div class="cal-grid-header">';
  DAYS_FR.forEach((d,i) => {
    html += `<div class="cal-day-name${i>=5?' we':''}">${d}</div>`;
  });
  html += '</div><div class="cal-grid">';

  const first = new Date(y, m, 1);
  let startDow = first.getDay(); startDow = startDow === 0 ? 6 : startDow - 1;
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const prevDays = new Date(y, m, 0).getDate();

  let cells = [];
  for (let i = startDow-1; i >= 0; i--) cells.push({ d: new Date(y, m-1, prevDays-i), other: true });
  for (let d = 1; d <= daysInMonth; d++) cells.push({ d: new Date(y, m, d), other: false });
  while (cells.length % 7 !== 0) cells.push({ d: new Date(y, m+1, cells.length - daysInMonth - startDow + 1), other: true });

  const today = dayKey(new Date());
  cells.forEach(cell => {
    const k = dayKey(cell.d);
    const we = isWeekend(cell.d);
    const fe = isFerie(cell.d);
    const oor = !inRange(cell.d);
    let cls = 'cal-cell';
    if (cell.other) cls += ' other-month';
    else if (oor) cls += ' out-of-range';
    else if (fe) cls += ' ferie';
    else if (we) cls += ' we';
    
    const slots = !cell.other && !oor ? (data.creneaux[k] || []) : [];
    const numCls = k === today ? 'day-num today-num' : 'day-num';

    html += `<div class="${cls}" data-key="${k}" onmousedown="startSelect('${k}')" onmouseenter="updateSelect('${k}')" onmouseup="endSelect('${k}')" ontouchstart="startSelect('${k}')" ontouchend="endSelect('${k}')" onclick="cellClick('${k}')">`;
    html += `<div class="${numCls}">${cell.other ? '' : cell.d.getDate()}</div>`;
    if (fe && !cell.other) html += `<div class="ferie-label">${FERIES[k]}</div>`;
    slots.forEach((s,i) => {
      const mem = data.membres.find(m => m.id === s.memberId);
      if (!mem) return;
      const c = COLORS[mem.color];
      html += `<div class="slot-tag" style="background:${c.bg};border-color:${c.border};color:${c.text}" onclick="event.stopPropagation();viewSlot('${k}')" title="${mem.name}${s.note?' · '+s.note:''}">`;
      html += `<span>${mem.name}</span>${s.note?'<span class="slot-note-icon">📝</span>':''}`;
      html += `</div>`;
    });
    html += `</div>`;
  });
  html += '</div>';
  wrap.innerHTML = html;
}

// ─── WEEK VIEW ────────────────────────────────────────────────────────────
function renderWeek() {
  // Find Monday of current week
  const d = new Date(viewDate);
  const dow = d.getDay(); 
  d.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
  
  const weekDays = [];
  for (let i = 0; i < 7; i++) {
    weekDays.push(new Date(d.getFullYear(), d.getMonth(), d.getDate() + i));
  }
  
  const label = weekDays[0].toLocaleDateString('fr-FR',{day:'numeric',month:'long'}) + ' – ' + weekDays[6].toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('period-label').textContent = label;

  const today = dayKey(new Date());
  let html = '<div class="week-grid">';
  // Corner
  html += '<div class="week-col-label" style="border-bottom:1px solid var(--border);"></div>';
  // Day headers
  DAYS_FR.forEach((dn, i) => {
    const dd = weekDays[i];
    const k = dayKey(dd);
    const we = isWeekend(dd);
    const fe = isFerie(dd);
    let cls = 'week-day-header';
    if (fe) cls += ' ferie'; else if (we) cls += ' we';
    const isToday = k === today;
    html += `<div class="${cls}" style="border-right:1px solid var(--border);">`;
    html += `<div class="wd-name" style="${we?'color:var(--accent)':''}">${dn}</div>`;
    html += `<div class="wd-date" style="${isToday?'color:var(--accent);':''}${!inRange(dd)?'opacity:0.3':''}">`;
    html += `${dd.getDate()} ${MONTHS_FR[dd.getMonth()].substring(0,3)}`;
    html += `</div>`;
    if (fe) html += `<div style="font-size:9px;color:#E65100;font-weight:500;">${FERIES[k]}</div>`;
    html += `</div>`;
  });

  // One row = "Permanences"
  html += '<div class="week-col-label" style="font-size:11px;color:var(--text-muted);font-weight:500;padding-top:12px;">Présences</div>';
  weekDays.forEach(dd => {
    const k = dayKey(dd);
    const oor = !inRange(dd);
    const we = isWeekend(dd);
    const fe = isFerie(dd);
    let cls = 'week-cell';
    if (oor) cls += ' out-of-range';
    else if (fe) cls += ' ferie';
    else if (we) cls += ' we';
    const slots = !oor ? (data.creneaux[k] || []) : [];
    html += `<div class="${cls}" onclick="cellClick('${k}')">`;
    slots.forEach(s => {
      const mem = data.membres.find(m => m.id === s.memberId);
      if (!mem) return;
      const c = COLORS[mem.color];
      html += `<div class="slot-tag" style="background:${c.bg};border-color:${c.border};color:${c.text}" onclick="event.stopPropagation();viewSlot('${k}')" title="${mem.name}${s.note?' · '+s.note:''}">`;
      html += `<span>${mem.name}</span>${s.note?'<span class="slot-note-icon">📝</span>':''}`;
      html += `</div>`;
    });
    if (!oor && slots.length === 0) html += '<div style="font-size:11px;color:var(--text-muted);padding:4px;">–</div>';
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('cal-wrap').innerHTML = html;
}

// ─── SELECTION (drag) ──────────────────────────────────────────────────────
function startSelect(k) {
  if (!inRange(keyToDate(k))) return;
  selecting = true;
  selStart = k;
  selEnd = k;
  updateSelectionUI();
}
function updateSelect(k) {
  if (!selecting || !inRange(keyToDate(k))) return;
  selEnd = k;
  updateSelectionUI();
}
function endSelect(k) {
  if (!selecting) return;
  selecting = false;
  selEnd = k;
  updateSelectionUI();
  // If a real drag (start != end), open slot modal immediately
  if (selStart && selEnd && selStart !== selEnd) {
    openSlotModal(null);
  }
}
function cellClick(k) {
  if (!inRange(keyToDate(k))) return;
  // If already has slots for current user, view them; otherwise open add modal
  const slots = data.creneaux[k] || [];
  selStart = k; selEnd = k;
  updateSelectionUI();
  openSlotModal(null);
}

function updateSelectionUI() {
  if (!selStart || !selEnd) return;
  const a = selStart < selEnd ? selStart : selEnd;
  const b = selStart < selEnd ? selEnd : selStart;
  const da = keyToDate(a), db = keyToDate(b);
  
  // highlight cells
  document.querySelectorAll('.cal-cell, .week-cell').forEach(el => {
    const k = el.dataset.key;
    if (k && k >= a && k <= b) el.classList.add('selecting');
    else el.classList.remove('selecting');
  });

  const infoEl = document.getElementById('selection-info');
  if (a === b) {
    infoEl.style.display = 'none';
  } else {
    const n = Math.round((db - da) / 86400000) + 1;
    infoEl.style.display = 'block';
    infoEl.textContent = `${n} jour(s) sélectionné(s) : du ${formatDateFR(da)} au ${formatDateFR(db)}`;
  }
}

function clearSelection() {
  selStart = null; selEnd = null;
  document.querySelectorAll('.selecting').forEach(el => el.classList.remove('selecting'));
  document.getElementById('selection-info').style.display = 'none';
}

// ─── SLOT MODAL ────────────────────────────────────────────────────────────
function openSlotModal(existingSlotId) {
  if (!currentUser) {
    showToast('Créez d\'abord votre étiquette');
    openMemberModal(false);
    return;
  }
  editingSlotId = existingSlotId;
  
  const a = selStart < selEnd ? selStart : selEnd;
  const b = selStart < selEnd ? selEnd : selStart;
  const da = keyToDate(a), db = keyToDate(b);

  if (a === b) {
    document.getElementById('modal-slot-title').textContent = 'Permanence';
    document.getElementById('slot-date-display').textContent = formatDateFR(da);
  } else {
    const n = Math.round((db-da)/86400000)+1;
    document.getElementById('modal-slot-title').textContent = `Permanence · ${n} jour(s)`;
    document.getElementById('slot-date-display').textContent = `Du ${formatDateFR(da)} au ${formatDateFR(db)}`;
  }

  // Populate member select (only current user's own)
  const sel = document.getElementById('slot-member-select');
  sel.innerHTML = `<option value="${currentUser.id}">${currentUser.name} (moi)</option>`;

  // Pre-fill note if editing
  document.getElementById('slot-note').value = '';
  document.getElementById('btn-delete-slot').style.display = 'none';
  if (existingSlotId) {
    // find slot
    const slots = data.creneaux[a] || [];
    const s = slots.find(s => s.id === existingSlotId);
    if (s) {
      document.getElementById('slot-note').value = s.note || '';
      document.getElementById('btn-delete-slot').style.display = 'inline-flex';
    }
  } else {
    // Check if user already has a slot on start day
    const existing = (data.creneaux[a] || []).find(s => s.memberId === currentUser.id);
    if (existing) {
      document.getElementById('slot-note').value = existing.note || '';
      editingSlotId = existing.id;
      document.getElementById('btn-delete-slot').style.display = 'inline-flex';
    }
  }

  document.getElementById('modal-slot').classList.add('open');
}

async function saveSlot() {
  if (!currentUser) return;
  const note = document.getElementById('slot-note').value.trim();
  const a = selStart <= selEnd ? selStart : selEnd;
  const b = selStart <= selEnd ? selEnd : selStart;
  
  // Iterate over all selected days
  let cur = new Date(keyToDate(a));
  const endD = keyToDate(b);
  while (cur <= endD) {
    const k = dayKey(cur);
    if (inRange(cur)) {
      if (!data.creneaux[k]) data.creneaux[k] = [];
      // Remove existing slot of this user on this day
      data.creneaux[k] = data.creneaux[k].filter(s => s.memberId !== currentUser.id);
      data.creneaux[k].push({ id: 'sl_'+Date.now()+'_'+k, memberId: currentUser.id, note });
    }
    cur.setDate(cur.getDate()+1);
  }

  closeModal('modal-slot');
  clearSelection();
  await saveData();
  render();
  showToast('Permanence enregistrée ✓');
}

async function deleteSlot() {
  if (!currentUser || !selStart) return;
  const a = selStart <= selEnd ? selStart : selEnd;
  const b = selStart <= selEnd ? selEnd : selStart;
  let cur = new Date(keyToDate(a));
  const endD = keyToDate(b);
  while (cur <= endD) {
    const k = dayKey(cur);
    if (data.creneaux[k]) {
      data.creneaux[k] = data.creneaux[k].filter(s => s.memberId !== currentUser.id);
      if (data.creneaux[k].length === 0) delete data.creneaux[k];
    }
    cur.setDate(cur.getDate()+1);
  }
  closeModal('modal-slot');
  clearSelection();
  await saveData();
  render();
  showToast('Permanence supprimée');
}

// ─── VIEW SLOT ─────────────────────────────────────────────────────────────
function viewSlot(k) {
  viewSlotDayKey = k;
  const d = keyToDate(k);
  document.getElementById('view-slot-title').textContent = formatDateFR(d);
  const slots = data.creneaux[k] || [];
  let html = '';
  slots.forEach(s => {
    const mem = data.membres.find(m => m.id === s.memberId);
    if (!mem) return;
    const c = COLORS[mem.color];
    html += `<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;">`;
    html += `<span style="background:${c.bg};color:${c.text};border:1.5px solid ${c.border};border-radius:99px;padding:2px 10px;font-size:13px;font-weight:500;white-space:nowrap;">${mem.name}</span>`;
    if (s.note) html += `<span style="font-size:13px;color:var(--text-soft);padding-top:2px;">${s.note}</span>`;
    html += `</div>`;
  });
  if (!html) html = '<p style="color:var(--text-muted);font-size:13px;">Aucune permanence ce jour.</p>';
  document.getElementById('view-slot-content').innerHTML = html;
  
  const canEdit = currentUser && slots.some(s => s.memberId === currentUser.id);
  document.getElementById('btn-edit-my-slot').style.display = canEdit ? 'inline-flex' : 'none';
  document.getElementById('modal-view-slot').classList.add('open');
}

function editMySlotFromView() {
  closeModal('modal-view-slot');
  selStart = viewSlotDayKey;
  selEnd = viewSlotDayKey;
  openSlotModal(null);
}

// ─── MODAL HELPERS ─────────────────────────────────────────────────────────
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  if (id === 'modal-slot') clearSelection();
}
document.querySelectorAll('.modal-overlay').forEach(ov => {
  ov.addEventListener('click', e => { if (e.target === ov) { closeModal(ov.id); } });
});
document.addEventListener('mouseup', () => { if (selecting) { selecting = false; } });

// ─── INIT ──────────────────────────────────────────────────────────────────
// Prevent text selection during drag
document.addEventListener('selectstart', e => { if (selecting) e.preventDefault(); });
</script>
